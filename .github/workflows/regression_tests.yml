name: Prompt Regression Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 AM UTC
  push:
    paths:
      - "examples/golden_datasets/**"

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
